services:
  - type: web
    name: netrik-backend
    runtime: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn src.serving.app:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: netrik-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.10.12

databases:
  - name: netrik-db
    plan: free
